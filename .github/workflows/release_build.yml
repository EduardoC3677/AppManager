name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 4.0.5)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      actions: read

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build Debug APKs
        id: build_apk
        run: |
          echo "🔨 Building debug APKs..."
          if ./gradlew clean assembleDebug --no-daemon --stacktrace; then
            echo "✅ Build successful"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Build failed"
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Build Universal Debug APK
        id: build_universal
        run: |
          echo "📦 Building universal APK..."
          if ./gradlew packageDebugUniversalApk --no-daemon; then
            echo "✅ Universal build successful"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Universal build failed"
            echo "build_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: List build outputs
        run: |
          echo "=== Build Outputs ==="
          find app/build/outputs -name "*.apk" -type f | head -20

      - name: Prepare artifacts
        id: prepare
        run: |
          mkdir -p artifacts

          # Copy universal debug APK
          if [ -f "app/build/outputs/apk_from_bundle/debug/app-debug-universal.apk" ]; then
            cp app/build/outputs/apk_from_bundle/debug/app-debug-universal.apk artifacts/AppManager_${{ steps.version.outputs.VERSION }}-debug-universal.apk
            echo "✅ Copied universal debug APK"
            echo "has_apk=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Universal APK not found!"
            echo "has_apk=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Copy architecture-specific debug APKs
          for apk in app/build/outputs/apk/debug/*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" artifacts/
              echo "✅ Copied: $(basename $apk)"
            fi
          done

          ls -la artifacts/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppManager-${{ steps.version.outputs.VERSION }}-debug
          path: artifacts/*.apk
          retention-days: 30

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.apk > SHA256SUMS.txt 2>/dev/null && cat SHA256SUMS.txt || echo "No checksums generated"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AppManager ${{ github.ref_name }}
          body: |
            ## 📱 AppManager ${{ github.ref_name }}

            ### ✨ Latest Features
            - **Smart Launcher Import**: Import SL backups to create app organization profiles
            - **Quick Filter Chips**: One-tap filtering for common categories
            - **Material You 2026 Design**: Expressive animations and haptic feedback
            - **Paging 3 Support**: Better performance for large app lists

            ### 🔧 Build Information
            - **Build Type**: Debug (unsigned)
            - **Branch**: ${{ github.ref_name }}
            - **Commit**: ${{ github.sha }}

            ### 📥 Installation
            1. Download the APK that matches your device:
               - `universal` - All architectures (larger file)
               - `arm64-v8a` - Most modern Android devices
               - `armeabi-v7a` - Older 32-bit ARM devices
               - `x86_64` - Emulators and some tablets
            2. Install on your device

            > ⚠️ **Note**: This is a debug build. For production releases with signed APKs, configure signing secrets.

            ---
            **Generated by GitHub Actions** | Build #${{ github.run_number }}
          files: artifacts/*
          draft: false
          prerelease: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify success
        run: |
          echo "✅ Build completed successfully!"
          echo "📦 Artifacts uploaded"
          echo "🚀 Release created (if configured)"
