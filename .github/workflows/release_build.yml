name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 4.0.5)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Get version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Build with Gradle
      run: ./gradlew clean assembleRelease --stacktrace

    - name: Build Universal APK
      run: ./gradlew packageReleaseUniversalApk

    - name: List APK files
      run: |
        echo "=== APK Files ==="
        find app/build/outputs -name "*.apk" -type f
        echo "================="

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts

        if [ -f "app/build/outputs/apk_from_bundle/release/app-release-universal.apk" ]; then
          cp app/build/outputs/apk_from_bundle/release/app-release-universal.apk artifacts/
          echo "Copied universal APK"
        fi

        for apk in app/build/outputs/apk/release/*.apk; do
          if [ -f "$apk" ]; then
            cp "$apk" artifacts/
          fi
        done

        ls -la artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AppManager-${{ steps.version.outputs.VERSION }}-release
        path: artifacts/*.apk
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: AppManager ${{ github.ref_name }}
        body: |
          ## AppManager+ (Fork of MuntashirAkon/AppManager)

          **Based on:** [App Manager](https://github.com/MuntashirAkon/AppManager) by Muntashir Al-Islam

          ### Additions in this fork
          - Batch app archiving with Shizuku/root/ADB support
          - Sort and filter by archivable apps
          - Material 3 Expressive motion and haptics
          - Shizuku as first-class mode of operation
          - Archive timestamp display in archived apps list
        files: |
          artifacts/*.apk
        prerelease: false
        generate_release_notes: false
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
