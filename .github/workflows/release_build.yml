name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 4.0.5)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Get version
      id: version
      run: |
        VERSION=${GITHUB_REF#refs/tags/v}
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version: $VERSION"

    - name: Build with Gradle
      run: ./gradlew clean assembleDebug --stacktrace

    - name: Build Universal APK
      run: ./gradlew packageDebugUniversalApk

    - name: List APK files
      run: |
        echo "=== APK Files ==="
        find app/build/outputs -name "*.apk" -type f
        echo "================="

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        
        if [ -f "app/build/outputs/apk_from_bundle/debug/app-debug-universal.apk" ]; then
          cp app/build/outputs/apk_from_bundle/debug/app-debug-universal.apk artifacts/
          echo "✅ Copied universal APK"
        fi
        
        for apk in app/build/outputs/apk/debug/*.apk; do
          if [ -f "$apk" ]; then
            cp "$apk" artifacts/
          fi
        done
        
        ls -la artifacts/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AppManager-${{ steps.version.outputs.VERSION }}-debug
        path: artifacts/*.apk
        retention-days: 30

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: AppManager ${{ github.ref_name }}
        body: |
          ## 🔒 Security Hardening
          - WebView security hardened
          - Hardcoded credentials removed
          - Memory leaks fixed
          
          ## 🎨 M3 Expressive
          - FAB Menu with spring animations
          - Loading Indicator
          - Split Button
          - Expressive haptics
          
          ## 🧪 Testing
          - LeakCanary enabled
          - Kotlin test support
          
          ⚠️ Debug build - needs testing!
        files: |
          artifacts/*.apk
        prerelease: true
        generate_release_notes: false
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
