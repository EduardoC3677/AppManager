name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 4.0.5)'
        required: true
        type: string
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9.0
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0'

      - name: 🔧 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🏷️ Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: 🏗️ Build Debug APK
        run: |
          echo "Starting Gradle build..."
          ./gradlew clean assembleDebug --stacktrace
          echo "Build complete!"

      - name: 📦 Build Universal APK
        run: |
          echo "Building universal APK..."
          ./gradlew packageDebugUniversalApk
          echo "Universal build complete!"

      - name: 📋 List APK files
        run: |
          echo "=== APK Files ==="
          find app/build/outputs -name "*.apk" -type f
          echo "================="

      - name: 📤 Prepare artifacts
        run: |
          mkdir -p artifacts
          
          # Copy universal APK
          if [ -f "app/build/outputs/apk_from_bundle/debug/app-debug-universal.apk" ]; then
            cp app/build/outputs/apk_from_bundle/debug/app-debug-universal.apk artifacts/
            echo "✅ Universal APK copied"
          else
            echo "❌ Universal APK not found!"
            exit 1
          fi
          
          # Copy architecture-specific APKs
          for apk in app/build/outputs/apk/debug/*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" artifacts/
              echo "✅ Copied: $(basename $apk)"
            fi
          done
          
          ls -la artifacts/

      - name: ⬆️ Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppManager-${{ steps.version.outputs.VERSION }}-debug
          path: artifacts/*.apk
          retention-days: 30

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AppManager ${{ github.ref_name }}
          body: |
            ## 📱 AppManager ${{ github.ref_name }}
            
            ### ✨ Features
            - Smart Launcher Import
            - Quick Filter Chips
            - Material You 2026 Design
            - Enhanced Security
            
            ### 🔧 Build Info
            - Debug build (unsigned)
            - Commit: ${{ github.sha }}
            
            ### 📥 Installation
            Download the APK matching your device architecture.
          files: artifacts/*.apk
          prerelease: true
          generate_release_notes: true
          fail_on_unmatched_files: true
